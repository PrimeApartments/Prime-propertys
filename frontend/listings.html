<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prime Property Listings</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f2f2f2;
}

header{
  background:#072b52;
  color:white;
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header h1{
  margin:0;
}

nav a{
  color:white;
  text-decoration:none;
  margin-left:20px;
  font-weight:bold;
}

.container{
  width:90%;
  margin:auto;
  padding:30px 0;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
  gap:20px;
}

.property-card{
  background:white;
  border-radius:10px;
  padding:15px;
  box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.property-card img{
  width:100%;
  height:250px;
  object-fit:cover;
  border-radius:10px;
  margin-bottom:10px;
}

.price{
  color:green;
  font-size:20px;
  font-weight:bold;
}

.status-badge{
  padding:8px 12px;
  border-radius:20px;
  font-size:12px;
  font-weight:bold;
  color:white;
}

.status-badge.Available{
  background:#28a745;
}

.status-badge.Reserved{
  background:#ffc107;
  color:black;
}

.status-badge.Sold{
  background:#dc3545;
}

.status-badge.Rented{
  background:#007bff;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:5px;
  cursor:pointer;
  margin-right:10px;
}

.delete-btn{
  background:red;
  color:white;
}

.edit-btn{
  background:#007bff;
  color:white;
}

footer{
  background:#072b52;
  color:white;
  text-align:center;
  padding:20px;
  margin-top:40px;
}

</style>
</head>

<body>

<header>
  <h1>Prime Property</h1>

  <nav>
    <a href="index.html">Home</a>
    <a href="listings.html">Listings</a>
  </nav>
</header>

<div class="container">

  <h2>Property Listings</h2>

  <div id="listings" class="grid"></div>

</div>

<footer>
  <p>© 2026 Prime Property</p>
</footer>

<script>

const listings =
document.getElementById("listings");

async function fetchProperties(){

  try{

    const response =
    await fetch(
      "https://prime-propertys.onrender.com/api/properties"
    );

    const properties =
    await response.json();

    listings.innerHTML = "";

    properties.forEach(property => {

      const card =
      document.createElement("div");

      card.className =
      "property-card";

      let imageUrl =
      "https://via.placeholder.com/600x400?text=No+Image";

      if(
        property.images &&
        property.images.length > 0
      ){
        imageUrl =
        `https://prime-propertys.onrender.com/${property.images[0]}`;
      }

      card.innerHTML = `

        <img
          src="${imageUrl}"
          alt="Property Image"
        >

        <div style="margin-bottom:10px;">
          <span class="status-badge ${property.status || 'Available'}">
            ${property.status || 'Available'}
          </span>
        </div>

        <h2>${property.title}</h2>

        <p>
          <strong>Location:</strong>
          ${property.location}
        </p>

        <p class="price">
          R ${property.price}
        </p>

        <p>
          <strong>Bedrooms:</strong>
          ${property.bedrooms || 0}
        </p>

        <p>
          <strong>Bathrooms:</strong>
          ${property.bathrooms || 0}
        </p>

        <p>
          ${property.description || ""}
        </p>

       ${localStorage.getItem("token") ? `
<button
  onclick="window.location.href='edit-property.html?id=${property._id}'"
>
  Edit
</button>

<button
  class="delete-btn"
  onclick="deleteProperty('${property._id}')"
>
  Delete
</button>
` : ""}
      `;

      listings.appendChild(card);

    });

  }catch(error){

    console.log(error);

    alert("Failed to load properties");

  }

}

async function deleteProperty(id){

  const token =
  localStorage.getItem("token");

  if(!token){

    alert("Please login first");

    return;

  }

  if(!confirm("Delete this property?"))
  return;

  try{

    const response =
    await fetch(

      `https://prime-propertys.onrender.com/api/properties/${id}`,

      {
        method:"DELETE",

        headers:{
          Authorization:
          `Bearer ${token}`
        }
      }

    );

    if(response.ok){

      alert("Property deleted");

      fetchProperties();

    }else{

      alert("Delete failed");

    }

  }catch(error){

    console.log(error);

  }

}

fetchProperties();

</script>

</body>
</html>
